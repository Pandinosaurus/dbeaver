data_collection_title=Data collection
data_collection_description=Help us improve DBeaver by sending anonymous data
data_collection_agreement_text=To improve user experience and product performance, DBeaver can collect some anonymous statistical data about feature usage and product configuration.\n\nThis data doesn't include any personal or sensitive information, such as database connection configuration, executed queries, or database information. The data sent complies with the <a href="https://dbeaver.com/privacy/">DBeaver Corporation Privacy Policy ↗</a>.\n\nDBeaver sends statistics before shutting down or during startup. Information we collect includes:\n- Brief information about your OS and locale\n- List of UI actions you do to better understand users' workflow\n- Databases you use to improve support for popular ones.\n\nYou can always opt out of data collection in the preferences.
data_collection_send_usage_statistics=Send anonymous usage statistics
data_collection_cannot_opt_out_notice=You cannot opt out from data sharing in this version of DBeaver.
